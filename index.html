<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOLD-PM | Alt-Universe Pirate Radio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --amber:#c8860a; --amber-bright:#ffb833; --amber-dim:#7a4f00; --darker:#050400; }
  html, body { height:100%; background:var(--darker); }
  body {
    font-family:'Special Elite',cursive;
    color:var(--amber);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  body::after {
    content:'';
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
    pointer-events:none;
    z-index:100;
  }
  .hero {
    position:relative;
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    overflow:hidden;
    cursor:pointer;
  }
  .hero-bg {
    position:absolute;
    inset:0;
    background-image:url('WOLD_AD.png');
    background-size:contain;
    background-position:center top;
    background-repeat:no-repeat;
    filter:brightness(0.75);
    z-index:0;
  }
  .hero-overlay {
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom,rgba(5,4,0,0) 0%,rgba(5,4,0,0) 25%,rgba(5,4,0,0.5) 65%,rgba(5,4,0,0.98) 100%);
    z-index:1;
  }
  .on-air-container {
    position:absolute;
    top:1.5rem;
    right:1.5rem;
    z-index:3;
  }
  .on-air-img {
    width:140px;
    opacity:0.2;
    filter:grayscale(1);
    transition:all 0.5s;
  }
  .on-air-img.active {
    opacity:1;
    filter:none;
    animation:onairpulse 2s ease-in-out infinite;
  }
  @keyframes onairpulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .station-display {
    position:relative;
    z-index:2;
    text-align:center;
    padding:0 2rem;
    margin-top:10rem;
  }
  .now-playing {
    font-family:'Courier Prime',monospace;
    font-size:0.7rem;
    letter-spacing:0.35em;
    color:var(--amber-dim);
    margin-bottom:0.5rem;
    min-height:1.2em;
    transition:opacity 0.5s;
  }
  .track-title {
    font-size:clamp(1rem,3vw,1.4rem);
    letter-spacing:0.08em;
    color:var(--amber-bright);
    text-shadow:0 0 30px var(--amber);
    min-height:1.8em;
    transition:opacity 0.5s;
  }
  .click-hint {
    font-family:'Courier Prime',monospace;
    font-size:0.65rem;
    letter-spacing:0.3em;
    color:var(--amber-dim);
    margin-top:2rem;
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  .click-hint.hidden { display:none; }
  footer {
    text-align:center;
    padding:1.2rem 1rem;
    border-top:1px solid rgba(122,79,0,0.15);
    position:relative;
    z-index:2;
  }
  footer .tagline { font-size:0.75rem; letter-spacing:0.2em; color:var(--amber-dim); margin-bottom:0.2rem; }
  footer .contact a { font-family:'Courier Prime',monospace; font-size:0.65rem; letter-spacing:0.15em; color:var(--amber-dim); text-decoration:none; }
  footer .contact a:hover { color:var(--amber-bright); }
  footer .disclaimer { font-family:'Courier Prime',monospace; font-size:0.55rem; color:rgba(122,79,0,0.25); letter-spacing:0.1em; margin-top:0.6rem; }
</style>
</head>
<body>
<div class="on-air-container">
  <img src="On_Air.png" class="on-air-img" id="onAirSign" alt="ON AIR">
</div>
<div class="hero" id="hero" onclick="tuneIn()">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="station-display">
    <div class="now-playing" id="nowPlaying">— WOLD-PM · ALT-UNIVERSE PIRATE RADIO —</div>
    <div class="track-title" id="trackTitle">Don't call us. Just listen.</div>
    <div class="click-hint" id="clickHint">[ CLICK TO TUNE IN ]</div>
  </div>
</div>
<footer>
  <div class="tagline">WOLD-PM — Post Meridian Radio · 1170 KC</div>
  <div class="tagline" style="font-size:0.65rem;margin-bottom:0.6rem;">Onward through the fog.</div>
  <div class="contact"><a href="mailto:management@wold-pm.com">management@wold-pm.com</a></div>
  <div class="disclaimer">No frogs were harmed in the making of this broadcast. Or the beer.</div>
</footer>
<audio id="audioPlayer" preload="none"></audio>
<script src="tracks_local.js"></script>
<script>
let current   = 0;
let tuned     = false;
let retries   = 0;
const MAX_RETRIES = 4;
const audio   = document.getElementById('audioPlayer');
const onAir   = document.getElementById('onAirSign');
const hint    = document.getElementById('clickHint');

function tuneIn() {
  if (tuned) return;
  tuned = true;
  hint.classList.add('hidden');

  // Wall-clock-synced position — simulates one continuous broadcast signal.
  // Everyone tuning in at the same real moment lands at the same point in
  // the loop (mid-track included), just like a real station, instead of
  // always getting a fresh start of a randomly-picked track.
  const totalDuration = tracks.reduce((sum, t) => sum + (t.duration || 180), 0);
  let elapsed = (Date.now() / 1000) % totalDuration;

  let idx = 0;
  for (; idx < tracks.length; idx++) {
    const d = tracks[idx].duration || 180;
    if (elapsed < d) break;
    elapsed -= d;
  }
  idx = Math.min(idx, tracks.length - 1);

  playTrack(idx, elapsed);
}

function playTrack(i, startOffset) {
  current = ((i % tracks.length) + tracks.length) % tracks.length;
  retries = 0;
  const t = tracks[current];
  document.getElementById('nowPlaying').textContent  = '▶ NOW BROADCASTING';
  document.getElementById('trackTitle').textContent  = t.title;
  onAir.classList.add('active');
  loadAndPlay(t.file, startOffset);
}

function loadAndPlay(url, startOffset) {
  audio.pause();
  audio.src = url;
  audio.load();
  audio.volume = 0.85;
  if (startOffset) {
    const seekOnceReady = () => {
      audio.currentTime = startOffset;
      audio.removeEventListener('loadedmetadata', seekOnceReady);
    };
    audio.addEventListener('loadedmetadata', seekOnceReady);
  }
  const p = audio.play();
  if (p !== undefined) {
    p.catch(err => {
      // Autoplay blocked — wait for user gesture already handled by tuneIn()
      console.warn('play() rejected:', err);
    });
  }
}

function nextTrack() {
  playTrack((current + 1) % tracks.length);
}

// Natural end — advance immediately
audio.addEventListener('ended', nextTrack);

// Error — retry same track up to MAX_RETRIES, then skip
audio.addEventListener('error', () => {
  retries++;
  if (retries <= MAX_RETRIES) {
    const delay = Math.min(1000 * retries, 4000);
    console.warn(`Track error, retry ${retries}/${MAX_RETRIES} in ${delay}ms:`, tracks[current].title);
    setTimeout(() => loadAndPlay(tracks[current].file), delay);
  } else {
    console.error(`Skipping after ${MAX_RETRIES} retries:`, tracks[current].title);
    setTimeout(nextTrack, 1000);
  }
});

// Stall detector — if playback stops progressing for 10s, nudge it
let lastTime  = 0;
let stallCount = 0;
setInterval(() => {
  if (!tuned || audio.paused || audio.ended) return;
  if (audio.currentTime === lastTime) {
    stallCount++;
    if (stallCount >= 2) {
      console.warn('Stall detected, skipping:', tracks[current].title);
      stallCount = 0;
      nextTrack();
    }
  } else {
    stallCount = 0;
  }
  lastTime = audio.currentTime;
}, 5000);
</script>

<script data-goatcounter="https://norsiwel.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

</body>
</html>
